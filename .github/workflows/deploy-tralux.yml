name: Deploy Tralux to GitHub Pages

# Builds the static export of the Tralux site (in tralux/) and publishes it
# to GitHub Pages. Enable Pages once: repo Settings → Pages → Source: GitHub Actions.

on:
  push:
    branches: [main]
    paths:
      - "tralux/**"
      - ".github/workflows/deploy-tralux.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: tralux
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: tralux/package-lock.json

      - name: Configure Pages
        id: pages
        uses: actions/configure-pages@v5

      - run: npm ci

      - name: Build static export
        env:
          NEXT_EXPORT: "true"
          # base_path is "/<repo>" for project sites, "" for user/custom-domain sites.
          PAGES_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: npm run build

      - name: Disable Jekyll processing
        run: touch out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: tralux/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
